server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: admin-system
  profiles:
    active: dev

# JWT 配置（通用）
jwt:
  secret: AdminSystem2026SecretKeyForJWTTokenGeneration123456
  expiration: 86400
  refresh-expiration: 604800
  header: Authorization
  prefix: Bearer

# 日志配置
logging:
  level:
    com.admin: debug
    org.springframework.security: info
    org.springframework.web: info
    org.hibernate.SQL: OFF
